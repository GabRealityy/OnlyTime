name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (informational)
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Tests (informational)
        id: test
        continue-on-error: true
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Quality summary
        if: always()
        run: |
          if [ "${{ steps.lint.outcome }}" = "failure" ]; then
            echo "::warning::Lint checks failed. Deploy continued intentionally."
          fi
          if [ "${{ steps.test.outcome }}" = "failure" ]; then
            echo "::warning::Tests failed. Deploy continued intentionally."
          fi

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main
          repository-name: SwissInnovationStudios/only-time
          token: ${{ secrets.GHP_TOKEN }}
